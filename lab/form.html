<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
 
</head>
 
<body>
    <h1>Donor Information</h1>
    <form action="/submit" method="post">
        <table>
            <tr>
                <td><label for="firstname">First Name:</label></td>
                <td><input type="text" id="firstname" name="firstname" required></td>
            </tr>
            <tr>
                <td><label for="lastname">Last Name:</label></td>
                <td><input type="text" id="lastname" name="lastname" required></td>
            </tr>
            <tr>
                <td><label for="company">Company:</label></td>
                <td><input type="text" id="company" name="company"></td>
            </tr>
            <tr>
                <td><label for="address1">Address 1:</label></td>
                <td><input type="text" id="address1" name="address1" required></td>
            </tr>
            <tr>
                <td><label for="address2">Address 2:</label></td>
                <td><input type="text" id="address2" name="address2"></td>
            </tr>
            <tr>
                <td><label for="city">City:</label></td>
                <td><input type="text" id="city" name="city" required></td>
            </tr>
            <tr>
                <td><label for="state">State:</label></td>
                <td><select id="state" name="state" required>
                        <option value="">Select a state</option>
                        <option value="BH">Brahmanbaria</option>
                        <option value="RS">Rajshahi</option>
                        <option value="DK">Dhaka</option>
                        <option value="CU">Cumilla</option>
                        <option value="SY">Sylhet</option>
                        <option value="CO">Chittagong</option>
 
                    </select></td>
            </tr>
            <tr>
                <td><label for="zip">Zip Code:</label></td>
                <td><input type="text" id="zip" name="zip" required></td>
            </tr>
            <tr>
                <td><label for="country">Country:</label></td>
                <td><select id="country" name="country" required>
                        <option value="">Select a country</option>
                        <option value="IT">Italy</option>
                        <option value="BR">Bangladesh</option>
 
 
                    </select></td>
            </tr>
            <tr>
                <td><label for="phone">Phone:</label></td>
                <td><input type="tel" id="phone" name="phone"></td>
            </tr>
            <tr>
                <td><label for="Fax">Fax:</label></td>
                <td><input type="tel" id="Fax" name="Fax"></td>
            </tr>
            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" name="email" required></td>
            </tr>
            <tr>
                <td><label for="donationamount">Donation Amount:</label>
                    <input type="radio" id="donationamount" name="donationamount" value="None">
                    <label for="Donation Amount"> None </label>
                    <input type="radiobutton" id="donationamount" name="donationamount" value="$50">
                    <label for="Donation Amount"> $50 </label>
                    <input type="radio" id="donationamount" name="donationamount" value="$100">
                    <label for="Donation Amount"> $100 </label>
                    <input type="radio" id="donationamount" name="donationamount" value="$150">
                    <label for="Donation Amount"> $150 </label>
                    <input type="radio" id="donationamount" name="donationamount" value="$200">
                    <label for="Donation Amount"> $200 </label>
                    <input type="radio" id="donationamount" name="donationamount" value="others">
                    <label for="Donation Amount"> others </label>
                </td>
            </tr>
            <tr>
                <td><label>Recurring Donation</label></td>
                <td>
                    <input type="checkbox" id="recurring" name="recurring" value="yes"
                    <label for="recurring">I am interested in giving on a regular basis.</label>
                    

            
                </td>
            </tr>
             <tr>
                <td></td>td>
            
 <html>
