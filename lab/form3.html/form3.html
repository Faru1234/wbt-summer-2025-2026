
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
</head>

<body>
<div class="field">
<div class="field">
<div class="field">Create your account</div>
<div class="field">Join us in a couple of steps.</div>
</div>

<div class="field">
<form class="field">
<div class="field">
<div class="field">
<label class="field" for="fullname">Full name</label>
</div>

<div class="field">
<input class="field" type="text" id="fullname" placeholder="Jane Doe">
</div>

</div>
<div class="field">
<div class="field">
<label class="field" for="age">Age</label>
</div>

<div class="field">
<input class="field" type="number" id="age" placeholder="28">
</div>
</div>
<div class="field">
<div class="field">
<label class="field" for="dob">Date of birth</label>
</div>
<div class="field">
<input class="field" type="date" id="dob" value="2026-06-25">
</div>
</div>
<div class="field">
<div class="field">
<label class="field" for="email">Email address</label>
</div>
<div class="field">
<input class="field" type="email" id="email" placeholder="jane@example.com">
</div>
</div>
<div class="field">
<div class="field">
<label class="field" for="password">Password</label>
</div>
<div class="field">
<input class="field" type="password" id="password" placeholder="••••••••">
</div>
</div>
<div class="field">
<div class="field">
<div class="field">Preferred contact</div>
</div>
<div class="field">
<span class="field">
<input class="field" type="radio" id="email-opt" name="contact-pref" value="email" checked>
<label class="field" for="email-opt">Email</label>
</span>
<span class="field">
<input class="field" type="radio" id="phone-opt" name="contact-pref" value="phone">
<label class="field" for="phone-opt">Phone</label>
</span>
<span class="field">
<input class="field" type="radio" id="sms-opt" name="contact-pref" value="sms">
<label class="field" for="sms-opt">SMS</label>

</span>
</div>
</div>
<div class="field">
<span class="field">
<button class="submit" type="submit">Submit</button>
<span></span>
<span class="field">
<button class="reset" type="reset">Reset</button>
<span>

</span>
</div>
</form>
</div>
</div>
</body>
</html>
